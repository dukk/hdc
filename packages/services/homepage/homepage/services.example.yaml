- Public apps:
    - Immich:
        icon: immich.png
        href: https://immich.dukk.org
        description: Photos & videos
        siteMonitor: https://immich.dukk.org
        showStats: true
        widget:
          type: immich
          url: "{{HOMEPAGE_VAR_IMMICH_URL}}"
          key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
          version: 2
          fields: ["photos", "videos", "storage"]
    - Vaultwarden:
        icon: vaultwarden.png
        href: https://vault.dukk.org
        description: Passwords
        siteMonitor: https://vault.dukk.org
    - Home Assistant:
        icon: home-assistant.png
        href: https://ha.dukk.org
        description: Smart home
        siteMonitor: https://ha.dukk.org
- Productivity:
    - n8n:
        icon: n8n.png
        href: http://n8n.hdc.dukk.org:5678
        description: Workflow automation
        siteMonitor: http://10.0.0.120:5678
- Monitoring:
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: http://uptime-kuma.hdc.dukk.org:3001
        description: Status pages
        siteMonitor: http://10.0.0.105:3001
- Virtualization:
    - Proxmox Cluster:
        icon: proxmox.png
        href: https://pve-a.hdc.dukk.org:8006
        description: Primary cluster · 5 nodes · PVE 9
        siteMonitor: https://10.0.0.11:8006
        showStats: true
        widget:
          type: proxmox
          url: "{{HOMEPAGE_VAR_PROXMOX_PVE_A_URL}}"
          username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_SECRET}}"
          fields: ["vms", "lxc", "resources.cpu", "resources.mem"]
    - Proxmox A:
        icon: proxmox.png
        href: https://pve-a.hdc.dukk.org:8006
        description: 10.0.0.11 · Hypervisor node
        siteMonitor: https://10.0.0.11:8006
        showStats: true
        widget:
          type: proxmox
          url: "{{HOMEPAGE_VAR_PROXMOX_PVE_A_URL}}"
          username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_SECRET}}"
          node: pve-a
          fields: ["vms", "lxc", "resources.cpu", "resources.mem"]
- Infrastructure:
    - Pi-hole A:
        icon: pi-hole.png
        href: http://pi-hole-a.hdc.dukk.org/admin
        description: DNS ad-block
        siteMonitor: http://10.0.0.4/admin
        showStats: true
        widget:
          type: pihole
          url: "{{HOMEPAGE_VAR_PIHOLE_A_URL}}"
          version: 6
          key: "{{HOMEPAGE_VAR_PIHOLE_A_KEY}}"
          fields: ["queries", "blocked", "blocked_percent", "gravity"]
    - UniFi:
        icon: unifi.png
        href: https://unifi.hdc.dukk.org
        description: Gateway · UDM
        ping: 10.0.0.1
        showStats: true
        widget:
          type: unifi
          url: "{{HOMEPAGE_VAR_UNIFI_URL}}"
          key: "{{HOMEPAGE_VAR_UNIFI_KEY}}"
          site: "{{HOMEPAGE_VAR_UNIFI_SITE}}"
          fields: ["uptime", "wan", "wlan_users", "wlan_devices"]
