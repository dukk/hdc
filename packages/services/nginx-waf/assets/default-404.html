<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1419;
      color: #c9d1d9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      padding: 2rem;
    }
    main { text-align: center; max-width: 44rem; }
    pre {
      display: inline-block;
      text-align: left;
      line-height: 1.1;
      font-size: clamp(0.5rem, 1.8vw, 0.8rem);
      color: #f0c674;
      white-space: pre;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #8b949e; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <pre aria-hidden="true">
      ___
     (o o)     .---.
      (V)     /  O  \
     '--'    |   |   |
    /   \    |  (_)  |
   | (_) |   \  |  /
    \___/     '---'
         \   /
          \ /
       .-------.
      /    O    \
     |___________|
    </pre>
    <h1>404 Not Found</h1>
    <p>No site matches this hostname on the HDC nginx WAF.</p>
  </main>
</body>
</html>
