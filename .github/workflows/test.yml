name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout hdc-clumps
        uses: actions/checkout@v4
        with:
          repository: dukk/hdc-clumps
          path: hdc-clumps
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Unit tests with coverage thresholds
        run: npm run test:coverage
      - name: Schema / inventory lint
        run: node apps/hdc-cli/cli.mjs docs lint
